services:
  db:
    image: postgres:15
    container_name: guiaorla_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: guiaorla
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d guiaorla"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend/GuiaOrlaPE.API
    container_name: guiaorla_backend
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=guiaorla;Username=postgres;Password=${POSTGRES_PASSWORD}
      - Jwt__Key=${JWT_KEY}
      # Origem (browser) autorizada a chamar a API. Deve bater com o endereço
      # pelo qual você acessa o frontend.
      # - LAN/IP: usa http://${HOST_ADDRESS}:3000 automaticamente.
      # - Domínio/nginx: defina PUBLIC_FRONTEND_URL no .env (ex.: https://meudominio.com).
      - Cors__AllowedOrigins=${PUBLIC_FRONTEND_URL:-http://${HOST_ADDRESS}:3000}
      # --- E-mail (opcional, usado em "esqueci minha senha") ---
      # - Email__Host=smtp.gmail.com
      # - Email__Port=587
      # - Email__User=${EMAIL_USER}
      # - Email__Password=${EMAIL_PASSWORD}
      # - Email__From=${EMAIL_USER}
    volumes:
      - uploads_data:/app/wwwroot/uploads
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend/guiaorla-frontend
      args:
        # URL que o NAVEGADOR usa para falar com a API. É "assada" no build,
        # então precisa ser um endereço que o navegador alcance (não localhost).
        # - LAN/IP: usa http://${HOST_ADDRESS}:5000 automaticamente.
        # - Domínio/nginx: defina PUBLIC_API_URL no .env (ex.: https://api.meudominio.com).
        NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL:-http://${HOST_ADDRESS}:5000}
    container_name: guiaorla_frontend
    depends_on:
      - backend
    ports:
      - "3000:3000"
    environment:
      # URL que o frontend (servidor Next) usa para falar com a API dentro da
      # rede do Docker.
      - API_URL_INTERNAL=http://backend:8080
      - NEXTAUTH_URL=${PUBLIC_FRONTEND_URL:-http://${HOST_ADDRESS}:3000}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
    restart: unless-stopped

volumes:
  db_data:
  uploads_data:
